<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SocialFlow AI — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#C8461A;--or-h:#b03a14;--or-lt:#fef0ea;--bg:#f5f6fa;--white:#fff;--text:#1a1208;--muted:#7a7f94;--border:#e6e8f0;--sw:214px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sb{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;box-shadow:2px 0 10px rgba(0,0,0,.04);transition:transform .3s}
.sb-logo{padding:19px 20px 15px;border-bottom:1px solid var(--border)}
.sb-brand{font-size:1.05rem;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.sb-brand em{color:var(--or);font-style:normal}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.nav-a{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.86rem;font-weight:500;transition:all .18s}
.nav-a:hover{background:var(--bg);color:var(--text)}
.nav-a.on{background:var(--or-lt);color:var(--or)}
.nav-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.nav-a.on .nav-ic{background:rgba(200,70,26,.1)}
.sb-bottom{padding:12px 10px;border-top:1px solid var(--border)}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.86rem;font-weight:500;transition:all .18s}
.sb-link:hover{background:var(--bg);color:var(--text)}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topnav{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.menu-tog{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted)}
.topnav-title{font-size:1.05rem;font-weight:700}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--border);border-radius:40px;padding:5px 14px 5px 5px;cursor:pointer}
.u-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--or),#f7a05e);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff}
.u-label{font-size:.63rem;color:var(--muted);line-height:1}
.u-name{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.3}
.content{padding:28px 32px;max-width:620px}
.sec{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:18px;overflow:hidden}
.sec-hd{padding:16px 20px;border-bottom:1px solid var(--border)}
.sec-hd h3{font-size:.95rem;font-weight:700}
.sec-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.profile-row{display:flex;align-items:center;gap:14px}
.p-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--or),#f7a05e);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff}
.p-name{font-weight:700;font-size:1.05rem}
.p-email{font-size:.82rem;color:var(--muted);margin-top:3px}
.sfld{display:flex;flex-direction:column;gap:6px}
.sfld label{font-size:.79rem;color:var(--muted);font-weight:500}
.sfld input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;background:#fafaf8;font-family:'Inter',sans-serif;font-size:.87rem;color:var(--text);outline:none;transition:border-color .18s}
.sfld input:focus{border-color:var(--or);background:#fff}
.sbtn{padding:10px 20px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s;border:none;width:fit-content}
.sbtn.primary{background:var(--or);color:#fff;box-shadow:0 3px 14px rgba(200,70,26,.3)}
.sbtn.primary:hover{background:var(--or-h)}
.sbtn.danger{background:#fff5f5;color:#dc2626;border:1.5px solid #fecaca}
.sbtn.danger:hover{background:#fef2ee}
.smsg{font-size:.8rem;margin-top:4px}
.smsg.ok{color:#16a34a}
.smsg.err{color:#dc2626}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat-box{background:var(--bg);border-radius:10px;padding:18px;text-align:center}
.stat-val{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.stat-lbl{font-size:.76rem;color:var(--muted)}
@media(max-width:768px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.main{margin-left:0}.menu-tog{display:block}.content{padding:20px 16px}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sb" id="sb">
    <div class="sb-logo"><div class="sb-brand">POSTFLOW <em>AI</em></div></div>
    <nav class="sb-nav">
      <a href="/dashboard.html" class="nav-a"><span class="nav-ic">✏️</span>Create Post</a>
      <a href="/history.html"   class="nav-a"><span class="nav-ic">🕐</span>Post History</a>
      <!-- <a href="/history.html"   class="nav-a"><span class="nav-ic">📄</span>Templates</a> -->
      <!-- <a href="/settings.html"  class="nav-a on"><span class="nav-ic">📊</span>Analytics</a> -->
    </nav>
    <div class="sb-bottom"><a href="/settings.html" class="sb-link"><span>⚙️</span>Settings</a></div>
  </aside>
  <div class="main">
    <div class="topnav">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-tog" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>
        <span class="topnav-title">Settings</span>
      </div>
      <div class="user-chip">
        <div class="u-av" id="uAv">S</div>
        <div><div class="u-label">Logged in as</div><div class="u-name" id="uName">User</div></div>
      </div>
    </div>
    <div class="content">

      <!-- Profile -->
      <div class="sec">
        <div class="sec-hd"><h3>👤 Profile</h3></div>
        <div class="sec-body">
          <div class="profile-row">
            <div class="p-av" id="pAv">S</div>
            <div><div class="p-name" id="pName">Loading…</div><div class="p-email" id="pEmail"></div></div>
          </div>
          <div class="sfld"><label>Display Name</label><input type="text" id="dName" placeholder="Your display name"/></div>
          <div><button class="sbtn primary" onclick="saveName()">Update Name</button><div class="smsg" id="nameMsg"></div></div>
        </div>
      </div>

      <!-- Password -->
      <div class="sec">
        <div class="sec-hd"><h3>🔒 Change Password</h3></div>
        <div class="sec-body">
          <div class="sfld"><label>Current Password</label><input type="password" id="curPass" placeholder="Enter current password"/></div>
          <div class="sfld"><label>New Password</label><input type="password" id="newPass" placeholder="Minimum 8 characters"/></div>
          <div class="sfld"><label>Confirm New Password</label><input type="password" id="confPass" placeholder="Repeat new password"/></div>
          <div><button class="sbtn primary" onclick="changePass()">Update Password</button><div class="smsg" id="passMsg"></div></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="sec">
        <div class="sec-hd"><h3>📊 Your Stats</h3></div>
        <div class="sec-body">
          <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" style="color:var(--or)" id="stPosts">—</div><div class="stat-lbl">Posts Generated</div></div>
            <div class="stat-box"><div class="stat-val" style="color:#0a66c2" id="stDays">—</div><div class="stat-lbl">Days Active</div></div>
            <div class="stat-box"><div class="stat-val" style="color:#22c55e">3</div><div class="stat-lbl">Platforms</div></div>
          </div>
        </div>
      </div>

      <!-- Danger -->
      <div class="sec" style="border-color:#fecaca">
        <div class="sec-hd" style="border-color:#fecaca"><h3>⚠️ Account</h3></div>
        <div class="sec-body">
          <p style="font-size:.84rem;color:var(--muted)">Signing out will redirect you to the login page.</p>
          <button class="sbtn danger" onclick="doSignOut()">🚪 Sign Out</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile,
         updatePassword, reauthenticateWithCredential,
         EmailAuthProvider }  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ════════════════════════════════════════════════
// 🔥  PASTE YOUR FIREBASE CONFIG HERE
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDlpPuHabqjMpEMKmEf2-0UcavIsCv7PPE",
    authDomain: "smpcg-6ec96.firebaseapp.com",
    projectId: "smpcg-6ec96",
    storageBucket: "smpcg-6ec96.firebasestorage.app",
    messagingSenderId: "679551500401",
    appId: "1:679551500401:web:8d989451a0b83f8d081bd0"
};
// ════════════════════════════════════════════════

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
let cur = null;
const $ = id => document.getElementById(id);

onAuthStateChanged(auth, async u => {
  if (!u) { window.location.href='/'; return; }
  cur = u;
  const n = u.displayName || u.email.split('@')[0];
  $('uName').textContent = n;  $('uAv').textContent = n[0].toUpperCase();
  $('pName').textContent = n;  $('pAv').textContent = n[0].toUpperCase();
  $('pEmail').textContent = u.email;
  $('dName').value = n;
  try {
    const d = await getDoc(doc(db,'users',u.uid));
    if (d.exists()) {
      const dat = d.data();
      $('stPosts').textContent = dat.postsGenerated || 0;
      if (dat.createdAt) {
        const days = Math.max(1, Math.floor((Date.now() - dat.createdAt.toDate().getTime())/(1000*60*60*24)));
        $('stDays').textContent = days;
      }
    }
  } catch {}
});

function showMsg(id, txt, type='ok') {
  const el = $(id); el.textContent = txt; el.className = 'smsg ' + type;
  if (type==='ok') setTimeout(() => el.textContent='', 4000);
}

window.saveName = async () => {
  const name = $('dName').value.trim();
  if (!name) return showMsg('nameMsg','Name cannot be empty.','err');
  try {
    await updateProfile(cur, { displayName: name });
    ['uName','pName'].forEach(id => $(id).textContent = name);
    ['uAv','pAv'].forEach(id => $(id).textContent = name[0].toUpperCase());
    showMsg('nameMsg','✅ Name updated!');
  } catch(e) { showMsg('nameMsg', e.message, 'err'); }
};

window.changePass = async () => {
  const cur_ = $('curPass').value;
  const nw   = $('newPass').value;
  const cf   = $('confPass').value;
  if (!cur_||!nw||!cf) return showMsg('passMsg','Please fill all fields.','err');
  if (nw.length < 8)   return showMsg('passMsg','Password must be at least 8 characters.','err');
  if (nw !== cf)       return showMsg('passMsg','New passwords do not match.','err');
  try {
    const cred = EmailAuthProvider.credential(cur.email, cur_);
    await reauthenticateWithCredential(cur, cred);
    await updatePassword(cur, nw);
    ['curPass','newPass','confPass'].forEach(id => $(id).value = '');
    showMsg('passMsg','✅ Password updated!');
  } catch(e) {
    showMsg('passMsg', e.code==='auth/wrong-password'?'Current password is incorrect.':e.message, 'err');
  }
};

window.doSignOut = async () => {
  if (confirm('Sign out of SocialFlow AI?')) { await signOut(auth); window.location.href='/'; }
};
</script>
</body>
</html>
