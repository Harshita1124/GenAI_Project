<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SocialFlow AI — History</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#C8461A;--or-h:#b03a14;--or-lt:#fef0ea;--bg:#f5f6fa;--white:#fff;--text:#1a1208;--muted:#7a7f94;--border:#e6e8f0;--sw:214px;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.11)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sb{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;box-shadow:2px 0 10px rgba(0,0,0,.04);transition:transform .3s}
.sb-logo{padding:19px 20px 15px;border-bottom:1px solid var(--border)}
.sb-brand{font-size:1.05rem;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.sb-brand em{color:var(--or);font-style:normal}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.nav-a{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.86rem;font-weight:500;transition:all .18s}
.nav-a:hover{background:var(--bg);color:var(--text)}
.nav-a.on{background:var(--or-lt);color:var(--or)}
.nav-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.nav-a.on .nav-ic{background:rgba(200,70,26,.1)}
.sb-bottom{padding:12px 10px;border-top:1px solid var(--border)}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.86rem;font-weight:500;transition:all .18s}
.sb-link:hover{background:var(--bg);color:var(--text)}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topnav{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.menu-tog{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted)}
.topnav-title{font-size:1.05rem;font-weight:700}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--border);border-radius:40px;padding:5px 14px 5px 5px;cursor:pointer}
.u-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--or),#f7a05e);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff}
.u-label{font-size:.63rem;color:var(--muted);line-height:1}
.u-name{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.3}
.content{padding:28px 32px}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.post-count{font-size:.85rem;color:var(--muted);margin-right:4px}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.82rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all .18s}
.filter-btn.on,.filter-btn:hover{background:var(--or-lt);color:var(--or);border-color:rgba(200,70,26,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.hist-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer}
.hist-card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.hc-img img{width:100%;height:175px;object-fit:cover;display:block}
.hc-img .no-img{height:100px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#ccc}
.hc-body{padding:14px}
.hc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plat-badge{font-size:.71rem;font-weight:600;padding:3px 10px;border-radius:10px;background:var(--or-lt);color:var(--or)}
.hc-date{font-size:.71rem;color:var(--muted)}
.hc-topic{font-weight:700;font-size:.92rem;margin-bottom:5px}
.hc-cap{font-size:.79rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hc-actions{display:flex;gap:8px;margin-top:10px}
.hc-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .18s}
.hc-btn:hover{border-color:var(--or);color:var(--or);background:var(--or-lt)}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty .ei{font-size:4rem;margin-bottom:16px;opacity:.5}
.empty a{color:var(--or);text-decoration:none;font-weight:600}
.empty a:hover{text-decoration:underline}
@media(max-width:768px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.main{margin-left:0}.menu-tog{display:block}.content{padding:20px 16px}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sb" id="sb">
    <div class="sb-logo"><div class="sb-brand">POSTFLOW <em>AI</em></div></div>
    <nav class="sb-nav">
      <a href="/dashboard.html" class="nav-a"><span class="nav-ic">✏️</span>Create Post</a>
      <a href="/history.html"   class="nav-a on"><span class="nav-ic">🕐</span>Post History</a>
      <!-- <a href="/history.html"   class="nav-a"><span class="nav-ic">📄</span>Templates</a> -->
      <!-- <a href="/settings.html"  class="nav-a"><span class="nav-ic">📊</span>Analytics</a> -->
    </nav>
    <div class="sb-bottom"><a href="/settings.html" class="sb-link"><span>⚙️</span>Settings</a></div>
  </aside>
  <div class="main">
    <div class="topnav">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-tog" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>
        <span class="topnav-title">Post History</span>
      </div>
      <div class="user-chip">
        <div class="u-av" id="uAv">S</div>
        <div><div class="u-label">Logged in as</div><div class="u-name" id="uName">User</div></div>
      </div>
    </div>
    <div class="content">
      <div class="filter-bar">
        <span class="post-count" id="postCount">Loading…</span>
        <button class="filter-btn on" onclick="filter('all',this)">All</button>
        <button class="filter-btn" onclick="filter('Instagram',this)">📸 Instagram</button>
        <button class="filter-btn" onclick="filter('LinkedIn',this)">💼 LinkedIn</button>
        <button class="filter-btn" onclick="filter('Twitter',this)">🐦 Twitter</button>
      </div>
      <div class="grid" id="grid"><div class="empty"><div class="ei">⏳</div><p>Loading posts…</p></div></div>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp }                                                    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged }                                      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, getDocs }         from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ════════════════════════════════════════════════
// 🔥  PASTE YOUR FIREBASE CONFIG HERE
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDlpPuHabqjMpEMKmEf2-0UcavIsCv7PPE",
    authDomain: "smpcg-6ec96.firebaseapp.com",
    projectId: "smpcg-6ec96",
    storageBucket: "smpcg-6ec96.firebasestorage.app",
    messagingSenderId: "679551500401",
    appId: "1:679551500401:web:8d989451a0b83f8d081bd0"
};
// ════════════════════════════════════════════════

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
let all = [];

onAuthStateChanged(auth, async u => {
  if (!u) { window.location.href='/'; return; }
  const n = u.displayName || u.email.split('@')[0];
  document.getElementById('uName').textContent = n;
  document.getElementById('uAv').textContent   = n[0].toUpperCase();
  await load(u.uid);
});

async function load(uid) {
  try {
    const q = query(collection(db,'posts'), where('userId','==',uid), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    all = snap.docs.map(d => ({id:d.id,...d.data()}));
    render(all);
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty"><div class="ei">⚠️</div><p>${e.message}</p></div>`;
  }
}

function render(posts) {
  const count = document.getElementById('postCount');
  const grid  = document.getElementById('grid');
  count.textContent = `${posts.length} post${posts.length!==1?'s':''}`;
  if (!posts.length) {
    grid.innerHTML = `<div class="empty"><div class="ei">🎨</div><p>No posts yet. <a href="/dashboard.html">Generate your first!</a></p></div>`;
    return;
  }
  grid.innerHTML = posts.map(p => {
    const date = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'Recent';
    const imgHtml = p.imageData
      ? `<div class="hc-img"><img src="${p.imageData}" alt="${p.topic}" loading="lazy"/></div>`
      : `<div class="hc-img"><div class="no-img">🖼️</div></div>`;
    const shortCap = (p.caption||'').substring(0,160);
    const safeCaption = (p.caption||'').replace(/\\/g,'\\\\').replace(/`/g,'\\`');
    return `<div class="hist-card">${imgHtml}
      <div class="hc-body">
        <div class="hc-meta"><span class="plat-badge">${p.platform}</span><span class="hc-date">${date}</span></div>
        <div class="hc-topic">${p.topic||'Untitled'}</div>
        <div class="hc-cap">${shortCap}${p.caption?.length>160?'…':''}</div>
        <div class="hc-actions">
          <button class="hc-btn" onclick='copyText(this,\`${safeCaption}\`)'>📋 Copy</button>
          ${p.imageData?`<button class="hc-btn" onclick="dlImg('${p.topic||'post'}',this)">⬇️ Image</button>`:''}
        </div>
      </div></div>`;
  }).join('');
  window._posts = posts;
}

window.filter = (plat, btn) => {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render(plat==='all' ? all : all.filter(p => p.platform===plat));
};

window.copyText = (btn, text) => {
  navigator.clipboard.writeText(text);
  btn.textContent = '✅ Copied!';
  setTimeout(() => btn.textContent = '📋 Copy', 2000);
};

window.dlImg = (topic, btn) => {
  const card = btn.closest('.hist-card');
  const img  = card?.querySelector('img');
  if (!img) return;
  const a = document.createElement('a');
  a.href = img.src; a.download = topic.replace(/\s+/g,'-') + '.jpg'; a.click();
};
</script>
</body>
</html>
